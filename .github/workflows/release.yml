name: Release portable cross-platform builds

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0 - must be semver-shaped)'
        required: true

permissions:
  contents: write

jobs:
  test:
    name: Test (Rust + frontend build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry / target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev

      - name: Run cargo tests
        working-directory: src-tauri
        run: cargo test --no-fail-fast

  build:
    name: Build (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-testbench
            runs_on: '["self-hosted","Windows","X64","testbench","fflag-check"]'
            target: x86_64-pc-windows-msvc
            asset_suffix: 'windows-portable.exe'
          - os: macos-latest
            runs_on: '"macos-latest"'
            target: aarch64-apple-darwin
            asset_suffix: 'macos-aarch64.dmg'
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Ensure Git Bash
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: powershell
        run: |
          $gitBashPaths = @(
            'C:\Program Files\Git\bin',
            'C:\Program Files\Git\usr\bin'
          ) | Where-Object { Test-Path $_ }

          if ($gitBashPaths.Count -eq 0) {
            throw 'Git Bash was not found on the testbench runner.'
          }

          foreach ($path in $gitBashPaths) {
            $path | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            $env:Path = "$path;$env:Path"
          }

          bash --version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry / target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install frontend deps
        run: npm ci

      - name: Resolve release tag
        id: tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            tag="$REF_NAME"
          else
            tag="$INPUT_TAG"
          fi
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?(\+[A-Za-z0-9.-]+)?$'; then
            echo "Refusing non-semver tag: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Windows portable build
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: npm run tauri -- build --no-bundle --target ${{ matrix.target }}

      - name: macOS bundle build (.app + .dmg)
        if: startsWith(matrix.os, 'macos')
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles app,dmg

      - name: Stage release asset (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        id: stage_win
        shell: powershell
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          ASSET_SUFFIX: ${{ matrix.asset_suffix }}
          TARGET: ${{ matrix.target }}
        run: |
          $src = "src-tauri/target/$env:TARGET/release/fflag-check.exe"
          if (!(Test-Path $src)) { throw "Build output not found: $src" }
          $dest = "TSBCC-FFlag-Scanner-$env:TAG-$env:ASSET_SUFFIX"
          Copy-Item $src $dest
          "asset=$dest" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Stage release asset (macOS)
        if: startsWith(matrix.os, 'macos')
        id: stage_mac
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          ASSET_SUFFIX: ${{ matrix.asset_suffix }}
          TARGET: ${{ matrix.target }}
        run: |
          src=$(ls "src-tauri/target/${TARGET}/release/bundle/dmg/"*.dmg 2>/dev/null | head -n 1)
          if [ -z "$src" ]; then
            echo "Build output not found under release/bundle/dmg/" >&2
            ls -la "src-tauri/target/${TARGET}/release/bundle/" || true
            exit 1
          fi
          dest="TSBCC-FFlag-Scanner-${TAG}-${ASSET_SUFFIX}"
          cp "$src" "$dest"
          echo "asset=$dest" >> "$GITHUB_OUTPUT"

      - name: Resolve staged asset name
        id: stage
        shell: bash
        env:
          WIN_ASSET: ${{ steps.stage_win.outputs.asset }}
          MAC_ASSET: ${{ steps.stage_mac.outputs.asset }}
        run: |
          asset="${WIN_ASSET}${MAC_ASSET}"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.asset }}
          path: ${{ steps.stage.outputs.asset }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            tag="$REF_NAME"
          else
            tag="$INPUT_TAG"
          fi
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?(\+[A-Za-z0-9.-]+)?$'; then
            echo "Refusing non-semver tag: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
