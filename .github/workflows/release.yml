name: Release portable cross-platform builds

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0 - must be semver-shaped)'
        required: true

permissions:
  contents: write

jobs:
  test:
    name: Test (Rust + frontend build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry / target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev

      - name: Run cargo tests
        working-directory: src-tauri
        run: |
          cargo test --no-fail-fast
          cargo test --manifest-path tools/memory_evidence_exporter/Cargo.toml --no-fail-fast

  build:
    name: Build (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-testbench
            runs_on: '["self-hosted","Windows","X64","testbench","fflag-check"]'
            target: x86_64-pc-windows-msvc
            asset_suffix: 'windows-portable.exe'
          - os: macos-latest
            runs_on: '"macos-latest"'
            target: aarch64-apple-darwin
            asset_suffix: 'macos-aarch64.dmg'
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Ensure Git Bash
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: powershell
        run: |
          $gitBashPaths = @(
            'C:\Program Files\Git\bin',
            'C:\Program Files\Git\usr\bin'
          ) | Where-Object { Test-Path $_ }

          if ($gitBashPaths.Count -eq 0) {
            throw 'Git Bash was not found on the testbench runner.'
          }

          foreach ($path in $gitBashPaths) {
            $path | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            $env:Path = "$path;$env:Path"
          }

          bash --version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Use persistent Cargo target dir (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: powershell
        run: |
          $targetDir = 'C:\actions-cache\fflag-check\cargo-target'
          New-Item -ItemType Directory -Path $targetDir -Force | Out-Null
          "CARGO_TARGET_DIR=$targetDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using persistent Cargo target dir: $targetDir"

      - name: Cache cargo registry / target
        if: matrix.target != 'x86_64-pc-windows-msvc'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install frontend deps
        run: npm ci

      - name: Clean stale Tauri bundles
        shell: bash
        run: |
          rm -rf src-tauri/target/release/bundle src-tauri/target/*/release/bundle
          if [ -n "${CARGO_TARGET_DIR:-}" ]; then
            rm -rf "$CARGO_TARGET_DIR"/release/bundle "$CARGO_TARGET_DIR"/*/release/bundle
          fi

      - name: Resolve release tag
        id: tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            tag="$REF_NAME"
          else
            tag="$INPUT_TAG"
          fi
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?(\+[A-Za-z0-9.-]+)?$'; then
            echo "Refusing non-semver tag: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Import Windows code-signing certificate
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: powershell
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            Write-Host "No Windows signing certificate secrets configured; Windows artifact will be unsigned."
            exit 0
          }

          $certPath = Join-Path $env:RUNNER_TEMP 'tsbcc-fflag-scanner.pfx'
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))

          $password = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          $cert = Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $password | Select-Object -First 1
          if (!$cert -or [string]::IsNullOrWhiteSpace($cert.Thumbprint)) {
            throw 'Imported Windows signing certificate did not expose a thumbprint.'
          }

          "WINDOWS_CODESIGN_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Imported Windows signing certificate: $($cert.Thumbprint)"

      - name: Windows portable build
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: npm run tauri -- build --no-bundle --target ${{ matrix.target }}

      - name: Sign Windows portable executable
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: powershell
        env:
          TARGET: ${{ matrix.target }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CODESIGN_THUMBPRINT)) {
            Write-Host "Skipping Authenticode signing because no certificate was imported."
            exit 0
          }

          $targetRoot = if ($env:CARGO_TARGET_DIR) { $env:CARGO_TARGET_DIR } else { "src-tauri/target" }
          $mainExe = Join-Path $targetRoot "$env:TARGET\release\fflag-check.exe"
          if (!(Test-Path $mainExe)) { throw "Build output not found: $mainExe" }

          $programFilesX86 = [Environment]::GetFolderPath('ProgramFilesX86')
          $kitsRoot = Join-Path $programFilesX86 'Windows Kits\10\bin'
          $signtool = Get-ChildItem $kitsRoot -Filter signtool.exe -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match '\\x64\\signtool\.exe$' } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (!$signtool) {
            throw 'signtool.exe was not found under the Windows Kits installation.'
          }

          & $signtool.FullName sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /sha1 $env:WINDOWS_CODESIGN_THUMBPRINT $mainExe
          & $signtool.FullName verify /pa /v $mainExe

      - name: macOS bundle build (.app + .dmg)
        if: startsWith(matrix.os, 'macos')
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles app,dmg

      - name: Stage release asset (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        id: stage_win
        shell: powershell
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          ASSET_SUFFIX: ${{ matrix.asset_suffix }}
          TARGET: ${{ matrix.target }}
        run: |
          $assetDir = "release-assets"
          New-Item -ItemType Directory -Path $assetDir -Force | Out-Null
          $targetRoot = if ($env:CARGO_TARGET_DIR) { $env:CARGO_TARGET_DIR } else { "src-tauri/target" }
          $src = Join-Path $targetRoot "$env:TARGET\release\fflag-check.exe"
          if (!(Test-Path $src)) { throw "Build output not found: $src" }
          $dest = Join-Path $assetDir "TSBCC-FFlag-Scanner-$env:TAG-$env:ASSET_SUFFIX"
          Copy-Item $src $dest

          "asset_path=$assetDir/*" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "artifact_name=TSBCC-FFlag-Scanner-$env:TAG-windows-assets" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Stage release asset (macOS)
        if: startsWith(matrix.os, 'macos')
        id: stage_mac
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          ASSET_SUFFIX: ${{ matrix.asset_suffix }}
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p release-assets
          src=$(ls "src-tauri/target/${TARGET}/release/bundle/dmg/"*.dmg 2>/dev/null | head -n 1)
          if [ -z "$src" ]; then
            echo "Build output not found under release/bundle/dmg/" >&2
            ls -la "src-tauri/target/${TARGET}/release/bundle/" || true
            exit 1
          fi
          dest="release-assets/TSBCC-FFlag-Scanner-${TAG}-${ASSET_SUFFIX}"
          cp "$src" "$dest"
          echo "asset_path=release-assets/*" >> "$GITHUB_OUTPUT"
          echo "artifact_name=TSBCC-FFlag-Scanner-${TAG}-macos-assets" >> "$GITHUB_OUTPUT"

      - name: Resolve staged asset name
        id: stage
        shell: bash
        env:
          WIN_ASSET_PATH: ${{ steps.stage_win.outputs.asset_path }}
          MAC_ASSET_PATH: ${{ steps.stage_mac.outputs.asset_path }}
          WIN_ARTIFACT_NAME: ${{ steps.stage_win.outputs.artifact_name }}
          MAC_ARTIFACT_NAME: ${{ steps.stage_mac.outputs.artifact_name }}
        run: |
          asset_path="${WIN_ASSET_PATH}${MAC_ASSET_PATH}"
          artifact_name="${WIN_ARTIFACT_NAME}${MAC_ARTIFACT_NAME}"
          echo "asset_path=$asset_path" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.artifact_name }}
          path: ${{ steps.stage.outputs.asset_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            tag="$REF_NAME"
          else
            tag="$INPUT_TAG"
          fi
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?(\+[A-Za-z0-9.-]+)?$'; then
            echo "Refusing non-semver tag: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
