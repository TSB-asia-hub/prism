name: Refresh tracker baselines

# Pulls the latest PCDesktopClient.json from MaximumADHD/Roblox-FFlag-Tracker
# (Roblox's public application-settings snapshot) and commits it into Prism's
# bundled data dir. The bundle drives the broad `Suspicious` tracker-derived
# detection path in `inspect_generic_singleton_overrides` — keeping it fresh
# limits the false-positive surface created by Roblox's daily A/B rollouts.
#
# Trigger: daily at 03:00 UTC + manual dispatch. Opens a PR rather than
# pushing direct so a human reviews the diff before it ships.

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: Refresh PCDesktopClient.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch upstream tracker snapshot
        run: |
          curl -sSL --fail \
            -o src-tauri/src/data/tracker/pc_desktop_client.json.new \
            https://raw.githubusercontent.com/MaximumADHD/Roblox-FFlag-Tracker/main/PCDesktopClient.json
          new_size=$(stat -c '%s' src-tauri/src/data/tracker/pc_desktop_client.json.new)
          if [ "$new_size" -lt 100000 ]; then
            echo "Refusing suspiciously small tracker snapshot ($new_size bytes); upstream may be broken." >&2
            exit 1
          fi
          mv src-tauri/src/data/tracker/pc_desktop_client.json.new \
             src-tauri/src/data/tracker/pc_desktop_client.json

      - name: Detect change
        id: diff
        run: |
          if git diff --quiet -- src-tauri/src/data/tracker/pc_desktop_client.json; then
            echo "No change in tracker snapshot."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tracker snapshot updated."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Rust
        if: steps.diff.outputs.changed == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        if: steps.diff.outputs.changed == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Tauri Linux system deps
        if: steps.diff.outputs.changed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev

      - name: Run tracker tests against the new snapshot
        if: steps.diff.outputs.changed == 'true'
        working-directory: src-tauri
        run: cargo test -p prism --lib tracker_baselines

      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: |
            chore(data): refresh tracker baselines from upstream

            Automated nightly refresh of
            src-tauri/src/data/tracker/pc_desktop_client.json from
            MaximumADHD/Roblox-FFlag-Tracker. Drives the broad Suspicious
            tracker-derived detection path; staleness directly raises
            the false-positive surface so we ship updates daily.
          branch: chore/refresh-tracker-baselines
          delete-branch: true
          title: 'chore(data): refresh tracker baselines'
          body: |
            Automated nightly refresh of the bundled tracker JSON.

            The pin tests in `src-tauri/src/data/tracker_baselines.rs`
            (`tracker_finds_known_int_flag`, `tracker_finds_log_network_at_seven`)
            ran against this snapshot and passed. Review the diff for
            any conspicuous flag-value shifts before merging.
          labels: data-refresh,automated
